<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객센터 챗봇</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 배경 네온 그라데이션 효과 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 50%, rgba(0, 200, 255, 0.1) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 700px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(15, 15, 25, 0.95);
            border-left: 1px solid rgba(0, 200, 255, 0.15);
            border-right: 1px solid rgba(0, 200, 255, 0.15);
        }

        /* 헤더 */
        .chat-header {
            padding: 20px 24px;
            background: rgba(10, 10, 20, 0.98);
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b2fff, #00c8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 16px rgba(0, 200, 255, 0.4);
            flex-shrink: 0;
        }

        .header-info h2 {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .header-info p {
            color: #00c8ff;
            font-size: 12px;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 6px #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 채팅창 */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 200, 255, 0.2) transparent;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(0, 200, 255, 0.2); border-radius: 4px; }

        /* 메시지 */
        .message { display: flex; gap: 10px; max-width: 80%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b2fff, #00c8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }

        .message.user .msg-bubble {
            background: linear-gradient(135deg, #7b2fff, #5a1fd1);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 0 12px rgba(123, 47, 255, 0.3);
        }

        .message.assistant .msg-bubble {
            background: rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            border: 1px solid rgba(0, 200, 255, 0.15);
            border-bottom-left-radius: 4px;
        }

        .message.assistant .msg-bubble strong { color: #00c8ff; }
        .message.assistant .msg-bubble ul { padding-left: 18px; margin: 6px 0; }
        .message.assistant .msg-bubble li { margin: 4px 0; }

        /* 입력창 */
        .input-area {
            padding: 16px 20px;
            background: rgba(10, 10, 20, 0.98);
            border-top: 1px solid rgba(0, 200, 255, 0.2);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 24px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #user-input:focus { border-color: rgba(0, 200, 255, 0.6); }
        #user-input::placeholder { color: rgba(255,255,255,0.3); }

        #send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7b2fff, #00c8ff);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.15s, box-shadow 0.15s;
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
            flex-shrink: 0;
        }

        #send-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
        }

        /* 타이핑 인디케이터 */
        .typing {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,200,255,0.15);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: #00c8ff;
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-5px); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="bot-avatar">🤖</div>
            <div class="header-info">
                <h2>고객센터 챗봇</h2>
                <p><span class="status-dot"></span>온라인 · 24시간 응대</p>
            </div>
        </div>

        <div id="chat-box">
            <div class="message assistant">
                <div class="msg-avatar">🤖</div>
                <div class="msg-bubble">안녕하세요! 무엇을 도와드릴까요? 😊</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="메시지를 입력하세요..." />
            <button id="send-btn">➤</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';

            if (role === 'assistant') {
                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                avatar.textContent = '🤖';
                div.appendChild(avatar);
                bubble.innerHTML = marked.parse(text);
            } else {
                bubble.textContent = text;
            }

            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing-indicator';
            div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function hideTyping() {
            const t = document.getElementById('typing-indicator');
            if (t) t.remove();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';
            showTyping();

            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            hideTyping();
            addMessage('assistant', data.reply);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
